<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <title>Movei | Search</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-nav="home">
  <div id="app-header"></div>

  <main class="page-main">
    <div class="container-wide">
      <section class="section-block page-hero">
        <div class="page-hero__copy">
          <span class="eyebrow">Search results</span>
          <h1 class="section-heading">Results for "<span id="search-query">Loading</span>"</h1>
          <p class="section-subtitle">
            A cleaner results layout that separates movies and TV while keeping the experience cohesive.
          </p>
        </div>

        <div class="page-hero__metrics">
          <div class="stat-card">
            <span class="stat-card__value" id="search-total">0</span>
            <span class="stat-card__label">Total matches</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__value" id="movie-count">0</span>
            <span class="stat-card__label">Movie matches</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__value" id="tv-count">0</span>
            <span class="stat-card__label">TV matches</span>
          </div>
        </div>
      </section>

      <section class="section-block">
        <div class="section-header-row">
          <div>
            <span class="eyebrow">Movies</span>
            <h2 class="section-heading">Film results</h2>
          </div>
        </div>

        <div class="media-grid" id="movies-results"></div>
      </section>

      <section class="section-block">
        <div class="section-header-row">
          <div>
            <span class="eyebrow">TV Shows</span>
            <h2 class="section-heading">Series results</h2>
          </div>
        </div>

        <div class="media-grid" id="tv-results"></div>
      </section>
    </div>
  </main>

  <div id="app-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
